name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: roy1723
  REPO_NAME: kubernetes-assistant

jobs:

  # ---------------------------------------------------------------------------
  # Stage 1: code quality (GitHub-hosted Linux runner)
  # ---------------------------------------------------------------------------
  lint-and-type:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.7.4 mypy==1.13.0 types-PyYAML types-requests

      - name: Ruff lint
        run: ruff check .

      - name: Mypy type check
        run: mypy --config-file mypy.ini agent orchestration inference_server mcp_server eval scripts

  # ---------------------------------------------------------------------------
  # Stage 2: evaluation (self-hosted Windows runner)
  # Runner inherits Python and Docker from the shell that launched ./run.cmd
  # ---------------------------------------------------------------------------
  evaluate:
    name: Model Evaluation
    needs: lint-and-type
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, kubernetes-assistant]
    defaults:
      run:
        shell: powershell
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Environment diagnostic
        run: |
          Write-Host "=== Environment diagnostic ==="
          $pythonCmd = Get-Command python -ErrorAction SilentlyContinue
          if ($pythonCmd) {
            Write-Host "Python: $($pythonCmd.Source)"
            python --version
          } else {
            Write-Host "ERROR: python not found on PATH."
            Write-Host "Restart the GitHub Actions runner from a shell where 'where.exe python' works."
            exit 1
          }
          Write-Host "Working dir: $(Get-Location)"

      - name: Verify Ollama HTTP API
        run: |
          try {
            $r = Invoke-WebRequest -UseBasicParsing -Uri http://localhost:11434/api/tags -TimeoutSec 5
            if ($r.StatusCode -ne 200) { throw "Bad status: $($r.StatusCode)" }
            Write-Host "Ollama API reachable."
          } catch {
            Write-Host "ERROR: Ollama not reachable at http://localhost:11434"
            exit 1
          }

      - name: Verify required models registered
        run: |
          $resp = Invoke-RestMethod -Uri http://localhost:11434/api/tags
          $names = $resp.models | ForEach-Object { $_.name }
          Write-Host "Available models:"
          $names | ForEach-Object { Write-Host "  - $_" }
          $hasMini = $names | Where-Object { $_ -match "phi3:mini" }
          $hasFt = $names | Where-Object { $_ -match "phi3-kubernetes" }
          if (-not $hasMini) { Write-Host "ERROR: Missing model phi3:mini"; exit 1 }
          if (-not $hasFt)   { Write-Host "ERROR: Missing model phi3-kubernetes"; exit 1 }
          Write-Host "Both required models present."

      - name: Install Python deps for eval
        run: |
          python -m pip install --upgrade pip
          pip install httpx==0.27.2 rouge-score==0.1.2 fastapi==0.115.0 "uvicorn[standard]==0.32.0" pydantic==2.9.2

      - name: Start FastAPI inference server (background)
        run: |
          $logFile = Join-Path $env:RUNNER_TEMP "fastapi.log"
          $errFile = Join-Path $env:RUNNER_TEMP "fastapi.err"
          $pidFile = Join-Path $env:RUNNER_TEMP "fastapi.pid"
          $pythonExe = (Get-Command python).Source

          $proc = Start-Process -FilePath $pythonExe `
            -ArgumentList "inference_server/main.py" `
            -RedirectStandardOutput $logFile -RedirectStandardError $errFile `
            -PassThru -NoNewWindow
          $proc.Id | Out-File -FilePath $pidFile
          Write-Host "Started FastAPI with PID $($proc.Id)"

          $ready = $false
          for ($i = 1; $i -le 30; $i++) {
            Start-Sleep -Seconds 2
            try {
              $r = Invoke-WebRequest -UseBasicParsing -Uri http://localhost:8000/health -TimeoutSec 3
              if ($r.StatusCode -eq 200) { $ready = $true; break }
            } catch {
              # not ready yet
            }
          }
          if (-not $ready) {
            Write-Host "FastAPI did not respond on /health within 60s."
            Write-Host "----- stdout -----"; Get-Content $logFile -ErrorAction SilentlyContinue
            Write-Host "----- stderr -----"; Get-Content $errFile -ErrorAction SilentlyContinue
            exit 1
          }
          Write-Host "FastAPI ready."

      - name: Run evaluation with threshold
        run: |
          python eval/evaluate.py --threshold 0.14

      - name: Stop FastAPI
        if: always()
        run: |
          $pidFile = Join-Path $env:RUNNER_TEMP "fastapi.pid"
          if (Test-Path $pidFile) {
            $pidValue = Get-Content $pidFile
            try {
              Stop-Process -Id $pidValue -Force -ErrorAction SilentlyContinue
              Write-Host "Stopped FastAPI (PID $pidValue)"
            } catch {
              Write-Host "FastAPI already stopped"
            }
            Remove-Item $pidFile -ErrorAction SilentlyContinue
          }

      - name: Upload eval results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.sha }}
          path: eval/results.json
          retention-days: 30
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Stage 3: build Docker images, push to GHCR
  # ---------------------------------------------------------------------------
  docker-build:
    name: Build & Push Docker Images
    needs: evaluate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build & push inference image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.inference
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.REPO_NAME }}-inference:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.REPO_NAME }}-inference:latest
          cache-from: type=gha,scope=inference
          cache-to: type=gha,mode=max,scope=inference

      - name: Build & push MCP image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.mcp
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.REPO_NAME }}-mcp:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.REPO_NAME }}-mcp:latest
          cache-from: type=gha,scope=mcp
          cache-to: type=gha,mode=max,scope=mcp

      - name: Build & push orchestration image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.orchestration
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.REPO_NAME }}-orchestration:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.REPO_NAME }}-orchestration:latest
          cache-from: type=gha,scope=orchestration
          cache-to: type=gha,mode=max,scope=orchestration

  # ---------------------------------------------------------------------------
  # Stage 4: deploy on self-hosted runner
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, kubernetes-assistant]
    defaults:
      run:
        shell: powershell
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Docker on runner
        run: |
          $dockerCmd = Get-Command docker -ErrorAction SilentlyContinue
          if (-not $dockerCmd) {
            $candidates = @(
              "C:\Program Files\Docker\Docker\resources\bin\docker.exe",
              "$env:ProgramFiles\Docker\Docker\resources\bin\docker.exe"
            )
            $dockerExe = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
            if ($dockerExe) {
              $dockerDir = Split-Path $dockerExe
              "PATH=$dockerDir;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Append
              Write-Host "Added Docker to PATH: $dockerDir"
            } else {
              Write-Host "ERROR: Docker not found. Install Docker Desktop or restart runner from a shell with docker on PATH."
              exit 1
            }
          } else {
            Write-Host "Docker found: $($dockerCmd.Source)"
          }

      - name: Record current image SHA for rollback
        id: prev
        run: |
          $prev = docker images --filter "reference=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.REPO_NAME }}-inference:latest" --format "{{.Tag}}" | Select-Object -First 1
          if (-not $prev) { $prev = "" }
          Write-Host "Previous tag captured: $prev"
          "previous_tag=$prev" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Log in to GHCR on runner
        run: |
          $token = "${{ secrets.GHCR_TOKEN }}"
          $token | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Pull new images
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.REPO_NAME }}-inference:${{ github.sha }}
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.REPO_NAME }}-orchestration:${{ github.sha }}

      - name: Re-tag pulled images as :latest
        run: |
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.REPO_NAME }}-inference:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.REPO_NAME }}-inference:latest
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.REPO_NAME }}-orchestration:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.REPO_NAME }}-orchestration:latest

      - name: Restart stack
        run: |
          docker compose -f docker-compose.deploy.yml down
          if ($LASTEXITCODE -ne 0) { Write-Host "down returned non-zero (likely already stopped), continuing" }
          docker compose -f docker-compose.deploy.yml up -d
          if ($LASTEXITCODE -ne 0) { Write-Host "compose up failed"; exit 1 }

      - name: Wait & health check
        id: health
        run: |
          $infOk = "no"
          $uiOk = "no"
          for ($i = 1; $i -le 30; $i++) {
            Start-Sleep -Seconds 3
            try {
              $r1 = Invoke-WebRequest -UseBasicParsing -Uri http://localhost:8000/health -TimeoutSec 3
              if ($r1.StatusCode -eq 200) { $infOk = "yes" }
            } catch { }
            try {
              $r2 = Invoke-WebRequest -UseBasicParsing -Uri http://localhost:7860/ -TimeoutSec 3
              if ($r2.StatusCode -eq 200) { $uiOk = "yes" }
            } catch { }
            if ($infOk -eq "yes" -and $uiOk -eq "yes") {
              Write-Host "Stack healthy after ${i}*3s"
              exit 0
            }
          }
          Write-Host "Health check FAILED (inference=$infOk, ui=$uiOk)"
          exit 1

      - name: Rollback on health failure
        if: failure() && steps.prev.outputs.previous_tag != ''
        run: |
          Write-Host "Rolling back to previous tag: ${{ steps.prev.outputs.previous_tag }}"
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.REPO_NAME }}-inference:${{ steps.prev.outputs.previous_tag }} ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.REPO_NAME }}-inference:latest
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.REPO_NAME }}-orchestration:${{ steps.prev.outputs.previous_tag }} ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.REPO_NAME }}-orchestration:latest
          docker compose -f docker-compose.deploy.yml up -d
          Write-Host "Rollback complete to ${{ steps.prev.outputs.previous_tag }}"